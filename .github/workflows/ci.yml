name: daml-tests

# Runs the Daml Script unit tests through `dpm trace test` on every push/PR.
# A failing test makes the command exit non-zero, so it gates CI directly, and
# failures are mapped back to source in the job log.

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    # daml test writes Unicode into its transaction HTML; a non-UTF-8 locale makes
    # damlc abort with "commitAndReleaseBuffer: invalid argument (invalid character)".
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Check out this package
        uses: actions/checkout@v4

      # Fetch the dpm-trace tool from GitHub as a CI step.
      - name: Check out dpm-trace
        uses: actions/checkout@v4
        with:
          repository: walnuthq/dpm-trace
          path: dpm-trace

      - name: Install Daml SDK
        run: |
          curl -sSL https://get.daml.com/ | sh -s 3.4.11
          echo "$HOME/.daml/bin" >> "$GITHUB_PATH"

      # Build the DAR so dpm trace test can verify failure text against the
      # compiled package with `damlc inspect` (the --dar flag below).
      - name: Build the DAR
        run: daml build

      # The gate: the passing suite in daml/Test.daml. A non-zero exit fails CI.
      - name: Run Daml Script unit tests (dpm trace test)
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/dpm-trace/src" python3 -m dpm_trace.cli test . \
            --daml daml \
            --files daml/Test.daml \
            --dar .daml/dist/asset-tests-1.0.0.dar \
            --junit dpm-trace-results.xml \
            --no-trees \
            --color always

      # A deliberately failing test (daml/FailureDemo.daml), shown to demonstrate
      # how dpm trace maps a failure to source. Non-blocking: continue-on-error
      # keeps the build green while the source-mapped failure appears in the log.
      - name: Failure demo (source-mapped, non-gating)
        continue-on-error: true
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/dpm-trace/src" python3 -m dpm_trace.cli test . \
            --daml daml \
            --files daml/FailureDemo.daml \
            --dar .daml/dist/asset-tests-1.0.0.dar \
            --no-trees \
            --color always

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dpm-trace-results
          path: dpm-trace-results.xml
